<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#10B981;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="clothingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0.75" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark theme background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Subtle decorative elements matching webpage -->
  <circle cx="80" cy="100" r="80" fill="#3B82F6" opacity="0.08" filter="url(#glow)"/>
  <circle cx="320" cy="280" r="100" fill="#60A5FA" opacity="0.06" filter="url(#glow)"/>
  <circle cx="200" cy="50" r="60" fill="#10B981" opacity="0.05"/>
  
  <!-- Head with blend colors -->
  <circle cx="200" cy="130" r="55" fill="url(#skinTone)" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Neck -->
  <rect x="185" y="180" width="30" height="25" fill="url(#skinTone)" opacity="0.85"/>
  
  <!-- Body/Clothing with blue gradient matching theme -->
  <ellipse cx="200" cy="270" rx="60" ry="85" fill="url(#clothingGradient)" filter="url(#glow)"/>
  
  <!-- Shoulders definition -->
  <path d="M 140 200 Q 200 220 260 200" stroke="#3B82F6" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Simple facial features -->
  <circle cx="182" cy="120" r="6" fill="#1a1f3a"/>
  <circle cx="218" cy="120" r="6" fill="#1a1f3a"/>
  
  <!-- Eyes shimmer (blue accent) -->
  <circle cx="182" cy="118" r="2" fill="#60A5FA" opacity="0.7"/>
  <circle cx="218" cy="118" r="2" fill="#60A5FA" opacity="0.7"/>
  
  <!-- Smile -->
  <path d="M 190 135 Q 200 142 210 135" stroke="#1a1f3a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Subtle glow outline -->
  <circle cx="200" cy="130" r="57" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="270" r="62" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.25"/>
</svg>